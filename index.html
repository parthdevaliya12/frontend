<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ✅ Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title (VERY IMPORTANT) -->
    <title>Parth Devaliya | Full Stack Developer</title>

    <!-- ✅ Meta Description -->
    <meta
      name="description"
      content="Parth Devaliya is a full stack developer specializing in React.js, Node.js, Tailwind CSS, and modern web applications. Explore projects, skills, and contact details."
    />

    <!-- ✅ Keywords -->
    <meta
      name="keywords"
      content="Parth Devaliya, full stack developer, React developer, Node.js developer, portfolio, web developer, Tailwind CSS, JavaScript"
    />

    <!-- ✅ Author -->
    <meta name="author" content="Parth Devaliya" />

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/svg+xml" href="/logo.png" />

    <!-- ✅ Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- 🔥 Open Graph (for social sharing) -->
    <meta property="og:title" content="Parth Devaliya Portfolio" />
    <meta
      property="og:description"
      content="Frontend Developer portfolio showcasing modern web projects using React and Tailwind."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:image" content="https://yourdomain.com/preview.png" />

    <!-- 🔥 Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Parth Devaliya Portfolio" />
    <meta
      name="twitter:description"
      content="Frontend Developer portfolio with React, Tailwind and modern UI."
    />
    <meta name="twitter:image" content="https://yourdomain.com/preview.png" />

    <!-- ✅ Theme Color -->
    <meta name="theme-color" content="#020617" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
